# Render Blueprint - EstimateIQ Prototype
# Deploy both frontend and backend as web services
#
# To deploy:
# 1. Push this repo to GitHub
# 2. Go to https://dashboard.render.com
# 3. Click "New" > "Blueprint"
# 4. Connect your GitHub repo
# 5. Render will detect this file and create both services

services:
  # Backend API (FastAPI)
  - type: web
    name: estimateiq-api
    runtime: python
    region: oregon
    plan: free
    rootDir: estimateiq-prototype/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DEBUG
        value: "false"
      - key: USE_REAL_LLM
        value: "false"
      - key: CORS_ORIGINS
        value: "https://estimateiq-frontend.onrender.com,http://localhost:3000"
    healthCheckPath: /health

  # Frontend (Next.js)
  - type: web
    name: estimateiq-frontend
    runtime: node
    region: oregon
    plan: free
    rootDir: estimateiq-prototype/frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NEXT_PUBLIC_API_URL
        value: "https://estimateiq-api.onrender.com"
